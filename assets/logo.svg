<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="2"/>

  <!-- Briefcase icon base -->
  <g transform="translate(50, 60)">
    <!-- Briefcase body -->
    <rect x="10" y="25" width="80" height="55" rx="3" fill="none" stroke="#6366f1" stroke-width="3"/>

    <!-- Briefcase handle -->
    <path d="M 25 25 Q 50 5 75 25" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>

    <!-- Briefcase lock -->
    <circle cx="50" cy="30" r="3" fill="#6366f1"/>

    <!-- Documents inside -->
    <rect x="20" y="35" width="25" height="35" fill="#6366f1" opacity="0.3" rx="2"/>
    <rect x="55" y="35" width="25" height="35" fill="#6366f1" opacity="0.2" rx="2"/>

    <!-- Checkmark for success -->
    <g transform="translate(65, 15)">
      <circle cx="0" cy="0" r="8" fill="#10b981" opacity="0.8"/>
      <polyline points="-3,-1 1,2 4,-2" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Text -->
  <text x="100" y="165" font-size="16" font-weight="bold" text-anchor="middle" fill="#6366f1" font-family="Arial, sans-serif">
    JOBSEEKER AI
  </text>
</svg>
